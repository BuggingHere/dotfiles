# ===========================
# Monitors
# ===========================
monitor=,preferred,auto,1

# ===========================
# Autostart
# ===========================
exec-once = waybar
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wlsunset -l 11.0 -L 76.9
exec-once = mako
exec-once = hyprpaper

# ===========================
# Environment
# ===========================
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,20
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1

# ===========================
# Input
# ===========================
input {
    kb_layout = us
    follow_mouse = 0
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# ===========================
# General
# ===========================
general {
    border_size = 2
    col.active_border = rgba(8aaabbff) rgba(b89ab8ff) 45deg
    col.inactive_border = rgba(2e2925ff)
    gaps_in = 6
    gaps_out = 12
    layout = dwindle
    resize_on_border = true
}

# ===========================
# Decoration
# ===========================
decoration {
    rounding = 8
    dim_inactive = true
    dim_strength = 0.1
    blur {
        enabled = false
    }
}

# ===========================
# Animations
# ===========================
animations {
    enabled = false
}

# ===========================
# Layouts
# ===========================
dwindle {
    pseudotile = true
    preserve_split = true
}

# ===========================
# Misc
# ===========================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
}

# ===========================
# Keybindings
# ===========================
$mod = SUPER

# Core
bind = $mod, Return, exec, foot
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, F, togglefloating
bind = $mod, A, exec, rofi -show drun
bind = $mod, P, pseudo
bind = $mod, T, togglesplit
bind = $mod, Z, exec, /home/buggy/.local/bin/toggle-touchpad
bind = $mod, Escape, exec, ~/.local/bin/rofi-power
bind = $mod, W, exec, ~/.local/bin/rofi-wifi
bind = $mod SHIFT, P, exec, ~/.local/bin/rofi-pass
# Focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move windows
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Screenshots
bind = , Print, exec, grimblast --notify copysave area ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SHIFT, Print, exec, grimblast --notify copysave screen ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SUPER, Print, exec, grimblast --notify copysave active ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png

# Clipboard
bind = $mod, V, exec, ~/.local/bin/rofi-clipboard

# Media keys
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Resize
binde = $mod CTRL, h, resizeactive, -20 0
binde = $mod CTRL, l, resizeactive, 20 0
binde = $mod CTRL, k, resizeactive, 0 -20
binde = $mod CTRL, j, resizeactive, 0 20
