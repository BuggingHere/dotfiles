# ============================================================
#  HYPRLAND CONFIG
# ============================================================

source = ~/.cache/wal/colors-hyprland.conf


# ── MONITORS ────────────────────────────────────────────────
monitor = eDP-1, 1920x1200@60, 0x0, 1


# ── VARIABLES ───────────────────────────────────────────────
$mainMod     = SUPER
$terminal    = kitty
$fileManager = thunar
$menu        = rofi -show drun
$scratchpad  = special:scratchpad
$scripts     = ~/.config/hypr/scripts


# ── AUTOSTART ───────────────────────────────────────────────
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = hypridle
exec-once = hyprpolkitagent
exec-once = wl-paste --watch cliphist store
exec-once = wl-clip-persist --clipboard regular
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wal -R -q

# ── ENVIRONMENT ─────────────────────────────────────────────
env = XCURSOR_SIZE, 16
env = XCURSOR_THEME, Bibata-Modern-Classic

env = XDG_SESSION_TYPE, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland

env = GDK_BACKEND, wayland,x11,*
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_QPA_PLATFORMTHEME, qt5ct
env = SDL_VIDEODRIVER, wayland,x11

env = MOZ_ENABLE_WAYLAND, 1
env = OZONE_PLATFORM, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = ELECTRON_ENABLE_WAYLAND, 1


# ── GENERAL ─────────────────────────────────────────────────
general {
    gaps_in  = 2
    gaps_out = 5

    border_size             = 3
    col.active_border       = $color1 $color3 45deg
    col.inactive_border     = $background

    resize_on_border        = true
    hover_icon_on_border    = true
    extend_border_grab_area = 10
    allow_tearing           = false
    layout                  = dwindle
}


# ── DECORATION ──────────────────────────────────────────────
decoration {
    rounding         = 16
    rounding_power   = 8
    active_opacity   = 1
    inactive_opacity = 1

    shadow {
        enabled = false
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        new_optimizations = true
        popups            = false
        ignore_opacity    = true
        xray              = false
    }
}


# ── ANIMATIONS ──────────────────────────────────────────────
animations {
    enabled = true

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1.0
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,           1, 10,   default
    animation = border,           1,  5.39, easeOutQuint
    animation = windows,          1,  4.79, easeOutQuint
    animation = windowsIn,        1,  4.1,  easeOutQuint, popin 87%
    animation = windowsOut,       1,  1.49, linear,       popin 87%
    animation = fadeIn,           1,  1.73, almostLinear
    animation = fadeOut,          1,  1.46, almostLinear
    animation = fade,             1,  3.03, quick
    animation = layers,           1,  3.81, easeOutQuint
    animation = layersIn,         1,  4,    easeOutQuint, fade
    animation = layersOut,        1,  1.5,  linear,       fade
    animation = fadeLayersIn,     1,  1.79, almostLinear
    animation = fadeLayersOut,    1,  1.39, almostLinear
    animation = workspaces,       0,  0,    ease
    animation = specialWorkspace, 1,  4,    easeOutQuint, slidevert
}


# ── LAYOUTS ─────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
    force_split    = 2
}

master {
    new_status = master
}


# ── MISC ────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    font_family             = CaskaydiaCove Nerd Font
    focus_on_activate       = true
}


# ── CURSOR ──────────────────────────────────────────────────
cursor {
    hide_on_key_press        = true
    no_warps                 = true
    persistent_warps         = false
    warp_on_change_workspace = false
}


# ── INPUT ───────────────────────────────────────────────────
input {
    kb_layout  = us
    kb_variant =
    kb_options =
    kb_model   =
    kb_rules   =

    follow_mouse       = 2
    sensitivity        = 0
    numlock_by_default = true
    repeat_rate        = 100
    repeat_delay       = 250

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
    name          = syna801a:00-06cb:cec6-mouse
    sensitivity   = 0.9
    accel_profile = flat
}


# ── WINDOW RULES ────────────────────────────────────────────

# pkgmgr
windowrule = float on,       match:title ^(pkgmgr)$
windowrule = center on,      match:title ^(pkgmgr)$
windowrule = size 900 600, match:title ^(pkgmgr)$

# btop
windowrule = float on,          match:title ^(btop)$
windowrule = center on,         match:title ^(btop)$
windowrule = size 900 600,   match:title ^(btop)$
windowrule = animation slide, match:title ^(btop)$
windowrule = opacity 0.85 0.85, match:title ^(btop)$

# scratchpad
windowrule = workspace special:scratchpad silent, match:title ^(scratchpad)$
windowrule = float on,       match:title ^(scratchpad)$
windowrule = size 900 600, match:title ^(scratchpad)$
windowrule = center on,      match:title ^(scratchpad)$
windowrule = animation slidedown, match:title ^(scratchpad)$

# pavucontrol
windowrule = float on,  match:class ^(pavucontrol)$
windowrule = center on, match:class ^(pavucontrol)$
windowrule = size 700 450, match:class ^(pavucontrol)$

# blueman
windowrule = float on,  match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$

# ── LAYER RULES ─────────────────────────────────────────────
layerrule = blur on,        match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications

layerrule = blur on,        match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = no_anim on,     match:namespace rofi

layerrule = blur on,        match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = no_anim on,     match:namespace waybar

# ============================================================
#  KEYBINDINGS
# ============================================================

# ── GENERAL ─────────────────────────────────────────────────
bind = $mainMod,       Q,      killactive
bind = $mainMod,       T,      togglefloating
bind = $mainMod SHIFT, T,      togglesplit
bind = $mainMod,       F,      fullscreen,   1
bind = $mainMod SHIFT, F,      fullscreen,   0
bind = $mainMod,       Z,      exec,         $scripts/toggle_touchpad.sh
bind = $mainMod SHIFT, DELETE, exec,         cliphist wipe
bind = $mainMod,       F1,     exec,         $scripts/keybinds.sh

# ── SCREENSHOTS / COLOR PICKER ───────────────────────────────
bind = ,               Print,       exec, hyprshot -m output -m eDP-1 --clipboard-only
bind = $mainMod,       Print,       exec, hyprshot -m region --clipboard-only
bind = $mainMod SHIFT, Print,       exec, hyprshot -o ~/Pictures/Screenshots/ -m region
bind = $mainMod,       P,           exec, hyprpicker -a

# ── ROFI ────────────────────────────────────────────────────
bind = $mainMod,       A,      exec, $menu
bind = $mainMod,       W,      exec, ~/.config/rofi/scripts/wallpaper-picker.sh
bind = $mainMod,       V,      exec, ~/.config/rofi/scripts/clipboard.sh
bind = $mainMod SHIFT, V,      exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ── WAYBAR ──────────────────────────────────────────────────
bind = $mainMod,       B,      exec, killall -SIGUSR1 waybar || waybar
bind = $mainMod SHIFT, B,      exec, pkill waybar && waybar

# ── SCRIPTS ─────────────────────────────────────────────────
bind = $mainMod,       G,      exec, $scripts/focus-mode.sh
bind = $mainMod,       X,      exec, $scripts/pkgmgr.sh

# ── POWER ───────────────────────────────────────────────────
bind = $mainMod SHIFT, Q,      exec, hyprlock
bind = $mainMod SHIFT, S,      exec, sh -c "hyprlock & sleep 0.5 && systemctl suspend"
bind = $mainMod SHIFT, M,      exec, hyprshutdown

# ── APPS ────────────────────────────────────────────────────
bind = $mainMod,       Return, exec, kitty
bind = $mainMod,       C,      exec, chromium
bind = $mainMod,       E,      exec, thunar
bind = $mainMod,       N,      exec, kitty --title nvim nvim
bind = $mainMod,       Y,      exec, kitty --title yazi yazi
bind = $mainMod SHIFT, C,      exec, chromium --incognito
bind = $mainMod,       U,      exec, kitty --title btop btop
bind = $mainMod,       F,      exec, firefox

# ── SCRATCHPAD ──────────────────────────────────────────────
bind = $mainMod,       grave,  exec,                           $scripts/scratchpad.sh
bind = $mainMod SHIFT, grave,  movetoworkspace,                special:scratchpad

# ── FOCUS ───────────────────────────────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ── SWAP WINDOWS ────────────────────────────────────────────
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

# ── RESIZE WINDOWS ──────────────────────────────────────────
binde = $mainMod CTRL, L, resizeactive,  30 0
binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, K, resizeactive,  0 -30
binde = $mainMod CTRL, J, resizeactive,  0  30

# ── MOVE / RESIZE WITH MOUSE ────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── WORKSPACES ──────────────────────────────────────────────
bind = $mainMod,       1, workspace, 1
bind = $mainMod,       2, workspace, 2
bind = $mainMod,       3, workspace, 3
bind = $mainMod,       4, workspace, 4
bind = $mainMod,       5, workspace, 5
bind = $mainMod,       6, workspace, 6
bind = $mainMod,       7, workspace, 7
bind = $mainMod,       8, workspace, 8
bind = $mainMod,       9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bind = $mainMod,       Space, togglespecialworkspace, magic
bind = $mainMod SHIFT, Space, movetoworkspace,        special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── MULTIMEDIA ──────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
