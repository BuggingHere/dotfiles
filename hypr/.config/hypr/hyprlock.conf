# ============================================================
#  HYPRLOCK CONFIG
# ============================================================

# ── GENERAL ─────────────────────────────────────────────────
general {
    hide_cursor        = true
    ignore_empty_input = true
}

# ── ANIMATIONS ──────────────────────────────────────────────
animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1

    animation = fade,       1, 5, easeOutQuint
    animation = fadeIn,     1, 5, easeOutQuint
    animation = fadeOut,    1, 3, easeOutQuint
    animation = inputField, 1, 3, easeOutQuint
}

# ── BACKGROUND ──────────────────────────────────────────────
background {
    monitor           =
    path = /home/buggy/Pictures/Wallpapers/Greenary_Mountains.png
    blur_passes       = 4
    blur_size         = 7
    contrast          = 0.90
    brightness        = 0.75
    vibrancy          = 0.10
    vibrancy_darkness = 0.20
}

# ── PROFILE PICTURE ─────────────────────────────────────────
image {
    monitor      =
    path         = ~/face.png
    size         = 100
    rounding     = -1
    border_size  = 2
    border_color = rgba(255, 255, 255, 0.15)
    position     = 0, 130
    halign       = center
    valign       = center
}

# ── GREETING ────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:3600000] bash ~/.config/hypr/scripts/greeting.sh
    color       = rgba(255, 255, 255, 0.55)
    font_size   = 14
    font_family = JetBrainsMono Nerd Font Propo
    position    = 0, 50
    halign      = center
    valign      = center
}

# ── CLOCK ───────────────────────────────────────────────────
label {
    monitor     =
    text        = $TIME
    color       = rgba(255, 255, 255, 0.90)
    font_size   = 76
    font_family = JetBrainsMono Nerd Font Propo Bold
    position    = 0, -30
    halign      = center
    valign      = center
}

# ── DATE ────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] date +"%A, %d %B"
    color       = rgba(255, 255, 255, 0.55)
    font_size   = 14
    font_family = JetBrainsMono Nerd Font Propo
    position    = 0, -100
    halign      = center
    valign      = center
}

# ── MEDIA PLAYER ────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:2000] bash ~/.config/hypr/scripts/hyprlock-media.sh
    color       = rgba(255, 255, 255, 0.45)
    font_size   = 12
    font_family = JetBrainsMono Nerd Font Propo
    position    = 0, 60
    halign      = center
    valign      = bottom
}

# ── INPUT FIELD ─────────────────────────────────────────────
input-field {
    monitor           =
    size              = 260, 50
    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.25
    dots_center       = true
    outer_color       = rgba(255, 255, 255, 0.10)
    inner_color       = rgba(0, 0, 0, 0.30)
    font_color        = rgba(255, 255, 255, 0.80)
    font_family       = JetBrainsMono Nerd Font Propo
    placeholder_text  = <i><span foreground="##ffffff55"> Password</span></i>
    check_color       = rgba(163, 190, 140, 0.80)
    fail_color        = rgba(191, 97, 106, 0.80)
    fail_text         = <i><span foreground="##bf616a"> Wrong password</span></i>
    fade_on_empty     = true
    hide_input        = false
    rounding          = 12
    position          = 0, 420
    halign            = center
    valign            = bottom
}
