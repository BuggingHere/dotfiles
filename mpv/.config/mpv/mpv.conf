# Video output and hardware decoding (very important for performance)
vo=gpu                  # Modern GPU-based output (or gpu-next on newer mpv)
hwdec=auto              # Auto-detect hardware decoding (vaapi on AMD/Intel, nvdec on NVIDIA, etc.)
# hwdec=auto-safe       # Safer alternative if you have driver issues
gpu-api=auto            # Usually vulkan or opengl; auto is fine

# Quality preset (uncomment one)
profile=high-quality    # Better scaling and rendering (uses more GPU)
# profile=opengl-hq     # Alternative classic preset

# Window behavior
autofit-larger=90%x90%  # Don't make window larger than 90% of screen
keep-open=yes           # Keep window open after playback ends
save-position-on-quit=yes  # Remember playback position

# Smoother playback
video-sync=display-resample
interpolation=yes
tscale=oversample

# Cache for network/streaming files (prevents buffering)
cache=yes
demuxer-max-bytes=1G
demuxer-max-back-bytes=512M

# Audio
ao=pulse                # Or pipewire if you use PipeWire
volume-max=150          # Allow going above 100% if needed

# Subtitles
sub-auto=fuzzy
slang=en,eng            # Preferred subtitle languages
alang=en,eng            # Preferred audio languages
sub-bold=yes

# Misc
osc=yes                 # On-screen controller (can be disabled if using uosc)
border=no               # No window border (cleaner look)
