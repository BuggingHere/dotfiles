# ===========================
# Core
# ===========================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on

# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ===========================
# Keybindings
# ===========================
# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim style navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ===========================
# Colors
# ===========================
bg="#1a1612"
bg_alt="#221e1a"
overlay="#2e2925"
muted="#6b6359"
fg="#d4c9b8"
accent="#8aaabb"
green="#8aac8a"
yellow="#d4aa6e"
red="#c4746e"

# ===========================
# Statusbar
# ===========================
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#221e1a,fg=#d4c9b8"

# Left
set -g status-left-length 40
set -g status-left "#[bg=#8aaabb,fg=#1a1612] #S #[bg=#221e1a,fg=#8aaabb]"

# Right
set -g status-right-length 60
set -g status-right "#[fg=#6b6359] %H:%M #[fg=#d4c9b8]%Y-%m-%d "

# Windows
set -g window-status-format "#[fg=#6b6359] #I:#W "
set -g window-status-current-format "#[fg=#d4c9b8,bg=#2e2925] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#2e2925"
set -g pane-active-border-style "fg=#8aaabb"

# Message
set -g message-style "bg=#221e1a,fg=#d4c9b8"

# ===========================
# Plugins
# ===========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
