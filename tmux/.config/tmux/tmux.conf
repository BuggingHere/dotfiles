# ══════════════════════════════════════════════════════════════
#  TMUX CONFIG — minimal, vim keys, pane focused
#  Location: ~/.config/tmux/tmux.conf
# ══════════════════════════════════════════════════════════════

# ── PREFIX ──────────────────────────────────────────────────
# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── GENERAL ─────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# No delay after pressing Escape (critical for Neovim)
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 10000

# Focus events (lets Neovim know when it gains focus)
set -g focus-events on

# ── PANE SPLITTING ──────────────────────────────────────────
# Split with | and - , open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# ── VIM PANE NAVIGATION ─────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── PANE RESIZING ───────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── COPY MODE (vim keys) ─────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send -X cancel

# ── RELOAD CONFIG ───────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded."

# ── STATUS BAR ──────────────────────────────────────────────
# Minimal — just what you need, nothing decorative
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors — dark minimal, matches your btop theme
set -g status-style "bg=#1a1a1a,fg=#888888"

# Left — session name
set -g status-left "#[fg=#555555] #S  "
set -g status-left-length 20

# Window list
setw -g window-status-format "#[fg=#555555]#I:#W "
setw -g window-status-current-format "#[fg=#cccccc,bold]#I:#W "

# Right — date and time
set -g status-right "#[fg=#555555]%H:%M  %d %b "
set -g status-right-length 30

# Pane border colors
set -g pane-border-style "fg=#2a2a2a"
set -g pane-active-border-style "fg=#555555"

# Message style
set -g message-style "bg=#1a1a1a,fg=#cccccc"
