# ══════════════════════════════════════════════════════════════
#  YAZI CONFIG
#  Location: ~/.config/yazi/yazi.toml
# ══════════════════════════════════════════════════════════════

[manager]
# Pane ratio: parent | current | preview
ratio          = [1, 2, 3]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true
linemode       = "size"

[preview]
tab_size       = 2
max_width      = 1000
max_height     = 1000
cache_dir      = ""
image_filter   = "triangle"
image_quality  = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0.0, 0.0, 0.0, 0.0]

[opener]
edit = [
  { run = 'nvim "$@"', desc = "Open in Neovim", block = true },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open with default app" },
]

[open]
rules = [
  # Text / code → Neovim
  { mime = "text/*",        use = "edit" },
  { mime = "application/json", use = "edit" },

  # Everything else → system default
  { mime = "*",             use = "open" },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
