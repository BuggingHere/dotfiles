# ============================================================
#  STARSHIP CONFIG
# ============================================================

# ── PROMPT ──────────────────────────────────────────────────
format = """
$directory$git_branch$git_status$character"""

right_format = """$status"""

add_newline = false

# ── DIRECTORY ───────────────────────────────────────────────
[directory]
style             = "bold fg:{color4}"
truncation_length = 3
truncate_to_repo  = true
format            = "[$path]($style) "

# ── GIT BRANCH ──────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "fg:{color5}"
format = "[$symbol$branch]($style) "

# ── GIT STATUS ──────────────────────────────────────────────
[git_status]
style      = "fg:{color1}"
format     = "([$all_status$ahead_behind]($style) )"
conflicted = "="
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
modified   = "!${count}"
untracked  = "?${count}"
staged     = "+${count}"
deleted    = "✘${count}"

# ── CHARACTER ───────────────────────────────────────────────
[character]
success_symbol = "[](bold fg:{color2})"
error_symbol   = "[](bold fg:{color1})"

# ── STATUS ──────────────────────────────────────────────────
[status]
format            = "[$status]($style)"
disabled          = false
pipestatus        = true

# ── DISABLED MODULES ────────────────────────────────────────
[cmd_duration]
disabled = true

[time]
disabled = true

[battery]
disabled = true

[username]
disabled = true

[hostname]
disabled = true
